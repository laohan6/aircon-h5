<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>饭饭小窝的空调</title>
    <link rel="stylesheet" href="styles.css?v=20260531-2" />
  </head>
  <body>
    <main class="app-shell" data-power="off" data-mode="cool" data-fan="2">
      <section class="hero" aria-label="空调预览">
        <div class="ac-unit" aria-live="polite">
          <div class="body-shine"></div>
          <div class="brand-mark">mi</div>
          <div class="display" aria-label="空调状态显示">
            <span id="displayTemp">24</span>
            <small>°C</small>
            <em id="displayMode">待机</em>
          </div>
          <div class="lower-lip">
            <span class="side-cap left"></span>
            <span class="vent-slit"></span>
            <span class="side-cap right"></span>
          </div>
          <div class="vent-cavity" aria-hidden="true">
            <span class="divider"></span>
            <span class="divider"></span>
            <span class="divider"></span>
            <span class="divider"></span>
            <span class="divider"></span>
            <span class="blade"></span>
            <span class="blade"></span>
          </div>
          <div class="swing-louver" aria-hidden="true"></div>
          <div class="airflow" aria-hidden="true">
            <i></i>
            <i></i>
            <i></i>
            <i></i>
            <i></i>
          </div>
          <div class="mode-effect" aria-hidden="true">
            <span class="cool-dot"></span>
            <span class="cool-dot"></span>
            <span class="warm-wave"></span>
            <span class="dry-drop"></span>
            <span class="fan-ring"></span>
            <span class="fan-pulse"></span>
            <span class="auto-orbit"></span>
            <span class="auto-orbit"></span>
            <span class="auto-orbit"></span>
          </div>
        </div>
      </section>

      <section class="panel compact-panel" aria-label="空调控制面板">
        <div class="panel-status">
          <div class="status-indicator" aria-hidden="true">
            <span class="status-light"></span>
            <span class="status-bars"><i></i><i></i><i></i></span>
          </div>
          <button class="power-button" id="powerButton" type="button" aria-pressed="false" aria-label="开关空调">
            <span></span>
          </button>
        </div>

        <div class="temperature-row" aria-label="温度控制">
          <button id="tempDown" type="button" aria-label="降低温度">-</button>
          <div class="temperature-value"><span id="panelTemp">24</span><small>°C</small></div>
          <button id="tempUp" type="button" aria-label="升高温度">+</button>
        </div>

        <input id="tempRange" type="range" min="16" max="30" value="24" aria-label="温度滑块" />

        <div class="fan-control" aria-label="风量控制">
          <div class="fan-icon" aria-hidden="true"><i></i><i></i><i></i></div>
          <input id="fanRange" type="range" min="1" max="3" step="1" value="2" aria-label="风量大小" />
        </div>

        <div class="mode-tabs" aria-label="模式切换">
          <button class="mode-button active" type="button" data-mode="cool" aria-label="制冷"><span>❄</span></button>
          <button class="mode-button" type="button" data-mode="heat" aria-label="制热"><span>☀</span></button>
          <button class="mode-button" type="button" data-mode="dry" aria-label="除湿"><span>◌</span></button>
          <button class="mode-button" type="button" data-mode="fan" aria-label="送风"><span>✦</span></button>
          <button class="mode-button" type="button" data-mode="auto" aria-label="自动"><span>A</span></button>
        </div>
      </section>
    </main>

    <audio id="runningAudio" src="soundEffect/airConditioner.mp3" preload="auto"></audio>
    <script src="script.js?v=20260531-2"></script>
  </body>
</html>
