<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能空调 H5 控制面板</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" data-power="off" data-mode="cool">
      <section class="scene" aria-label="空调演示">
        <div class="ambient ambient-one"></div>
        <div class="ambient ambient-two"></div>

        <div class="ac-unit" aria-live="polite">
          <div class="ac-topline"></div>
          <div class="display">
            <span class="status-dot"></span>
            <span id="displayMode">待机</span>
            <strong><span id="displayTemp">24</span>°C</strong>
          </div>
          <div class="brand">AURORA AIR</div>
          <div class="vent">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="airflow" aria-hidden="true">
            <i></i>
            <i></i>
            <i></i>
            <i></i>
            <i></i>
            <i></i>
          </div>
          <div class="effect-layer" aria-hidden="true">
            <span class="flake"></span>
            <span class="flake"></span>
            <span class="flake"></span>
            <span class="heat-wave"></span>
            <span class="heat-wave"></span>
            <span class="drop"></span>
            <span class="drop"></span>
            <span class="fan-ring"></span>
          </div>
        </div>
      </section>

      <section class="panel" aria-label="空调操作面板">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Smart Climate</p>
            <h1>空调控制</h1>
          </div>
          <button class="power-button" id="powerButton" type="button" aria-pressed="false">
            <span class="power-icon"></span>
          </button>
        </div>

        <div class="readout">
          <span id="stateText">设备已关闭</span>
          <strong><span id="panelTemp">24</span>°</strong>
        </div>

        <div class="temperature-control" aria-label="温度控制">
          <button id="tempDown" type="button" aria-label="降低温度">−</button>
          <input id="tempRange" type="range" min="16" max="30" value="24" />
          <button id="tempUp" type="button" aria-label="升高温度">+</button>
        </div>

        <div class="mode-grid" aria-label="模式切换">
          <button class="mode-button active" type="button" data-mode="cool">
            <span>❄</span>
            <strong>制冷</strong>
          </button>
          <button class="mode-button" type="button" data-mode="heat">
            <span>☀</span>
            <strong>制热</strong>
          </button>
          <button class="mode-button" type="button" data-mode="dry">
            <span>◌</span>
            <strong>除湿</strong>
          </button>
          <button class="mode-button" type="button" data-mode="fan">
            <span>✦</span>
            <strong>送风</strong>
          </button>
          <button class="mode-button" type="button" data-mode="auto">
            <span>A</span>
            <strong>自动</strong>
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
